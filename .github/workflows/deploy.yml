name: Deploy umrah-mgmt

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy Code & Migrate
        run: |
          cd /home/umrah-mgmt
          git fetch origin main
          git reset --hard origin/main
          /home/frappe/.local/bin/bench --site 26i.uk migrate
          /home/frappe/.local/bin/bench build
          /home/frappe/.local/bin/bench restart
