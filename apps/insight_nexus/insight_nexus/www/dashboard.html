{% extends "templates/web.html" %}

{% block title %}Check-In Dashboard{% endblock %}

{% block page_content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">
                <i class="fa fa-dashboard"></i> Check-In Dashboard
            </h1>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Today's Check-Ins</h5>
                    <h2 id="today-checkins" class="text-primary">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">This Week</h5>
                    <h2 id="week-checkins" class="text-info">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">This Month</h5>
                    <h2 id="month-checkins" class="text-success">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Total Hours</h5>
                    <h2 id="total-hours" class="text-warning">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Recent Check-Ins</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover" id="checkins-table">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Check-In Time</th>
                                    <th>Check-Out Time</th>
                                    <th>Duration</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6" class="text-center text-muted">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadDashboardData();
});

function loadDashboardData() {
    // Get today's check-ins
    frappe.call({
        method: 'insight_nexus.insight_nexus.api.check_in.get_today_checkins',
        callback: function(r) {
            if (r.message) {
                document.getElementById('today-checkins').textContent = r.message.count || 0;
            }
        }
    });

    // Get week's check-ins
    frappe.call({
        method: 'insight_nexus.insight_nexus.api.check_in.get_week_checkins',
        callback: function(r) {
            if (r.message) {
                document.getElementById('week-checkins').textContent = r.message.count || 0;
            }
        }
    });

    // Get month's check-ins
    frappe.call({
        method: 'insight_nexus.insight_nexus.api.check_in.get_month_checkins',
        callback: function(r) {
            if (r.message) {
                document.getElementById('month-checkins').textContent = r.message.count || 0;
            }
        }
    });

    // Get total hours
    frappe.call({
        method: 'insight_nexus.insight_nexus.api.check_in.get_total_hours',
        callback: function(r) {
            if (r.message) {
                document.getElementById('total-hours').textContent = (r.message.hours || 0).toFixed(1);
            }
        }
    });

    // Get recent check-ins
    frappe.call({
        method: 'insight_nexus.insight_nexus.api.check_in.get_recent_checkins',
        args: {
            limit: 10
        },
        callback: function(r) {
            if (r.message) {
                let tbody = document.querySelector('#checkins-table tbody');
                tbody.innerHTML = '';

                if (r.message.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No check-ins found</td></tr>';
                } else {
                    r.message.forEach(record => {
                        let row = document.createElement('tr');
                        let duration = '--';
                        if (record.check_out_time && record.check_in_time) {
                            let diff = new Date(record.check_out_time) - new Date(record.check_in_time);
                            let hours = Math.floor(diff / 3600000);
                            let minutes = Math.floor((diff % 3600000) / 60000);
                            duration = hours + 'h ' + minutes + 'm';
                        }

                        let location = '--';
                        if (record.latitude && record.longitude) {
                            location = record.latitude.toFixed(4) + ', ' + record.longitude.toFixed(4);
                        }

                        let status = record.check_out_time ? 'Completed' : 'Active';
                        let statusBadge = record.check_out_time ? 
                            '<span class="badge bg-success">Completed</span>' : 
                            '<span class="badge bg-info">Active</span>';

                        row.innerHTML = `
                            <td>${new Date(record.check_in_time).toLocaleDateString()}</td>
                            <td>${new Date(record.check_in_time).toLocaleTimeString()}</td>
                            <td>${record.check_out_time ? new Date(record.check_out_time).toLocaleTimeString() : '--'}</td>
                            <td>${duration}</td>
                            <td><small>${location}</small></td>
                            <td>${statusBadge}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            }
        }
    });
}

// Refresh data every 30 seconds
setInterval(loadDashboardData, 30000);
</script>

<style>
.card {
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
}

.table-hover tbody tr:hover {
    background-color: #f8f9fa;
}
</style>
{% endblock %}
