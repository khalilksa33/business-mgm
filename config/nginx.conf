# ══════════════════════════════════════════════════════════════════════════════
# NOTE: This nginx.conf is NOT active in production.
#
# Traffic routing is handled entirely by Cloudflare Tunnel (cloudflared):
#   Visitor → Cloudflare Edge (HTTPS) → CF Tunnel → localhost:8000 (gunicorn)
#
# Nginx is not installed on erp-worker-02. This file is kept for reference
# only, in case nginx is ever added in front of the CF Tunnel ingress.
# ══════════════════════════════════════════════════════════════════════════════

upstream umrah-mgmt-umrah {
	server 127.0.0.1:8000 fail_timeout=0;
}

upstream umrah-mgmt-socketio-server {
	server 127.0.0.1:9001 fail_timeout=0;
}

# ─────────────────────────────────────────────────────────────────────────────
# Restore real visitor IPs from Cloudflare proxy headers.
# CF IP ranges: https://www.cloudflare.com/ips/
# ─────────────────────────────────────────────────────────────────────────────
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS server block (Full Strict mode via Cloudflare Origin Certificate)
# CF handles HTTP → HTTPS — no redirect needed here.
# ─────────────────────────────────────────────────────────────────────────────
server {

	listen 443 ssl;
	listen [::]:443 ssl;

	server_name 26i.uk;

	# Cloudflare Origin Certificate
	# Generate at: CF Dashboard → SSL/TLS → Origin Server → Create Certificate
	ssl_certificate     /etc/ssl/cloudflare/26i.uk.pem;
	ssl_certificate_key /etc/ssl/cloudflare/26i.uk.key;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;

	root /home/iicc2/umrah-mgmt/sites;

	proxy_buffer_size 128k;
	proxy_buffers 4 256k;
	proxy_busy_buffers_size 256k;

	add_header X-Frame-Options "SAMEORIGIN";
	add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
	add_header X-Content-Type-Options nosniff;
	add_header X-XSS-Protection "1; mode=block";
	add_header Referrer-Policy "same-origin, strict-origin-when-cross-origin";

	location /assets {
		try_files $uri =404;
		add_header Cache-Control "max-age=31536000";
	}

	location ~ ^/protected/(.*) {
		internal;
		try_files /26i.uk/$1 =404;
	}

	location /socket.io {
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header X-Frappe-Site-Name 26i.uk;
		proxy_set_header Origin $scheme://$http_host;
		proxy_set_header Host $host;
		proxy_pass http://umrah-mgmt-socketio-server;
	}

	location / {
		rewrite ^(.+)/$ $1 permanent;
		rewrite ^(.+)/index\.html$ $1 permanent;
		rewrite ^(.+)\.html$ $1 permanent;

		location ~* ^/files/.*.(htm|html|svg|xml) {
			add_header Content-disposition "attachment";
			try_files /26i.uk/public/$uri @webserver;
		}

		try_files /26i.uk/public/$uri @webserver;
	}

	location @webserver {
		proxy_http_version 1.1;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Frappe-Site-Name 26i.uk;
		proxy_set_header Host $host;
		proxy_set_header X-Use-X-Accel-Redirect True;
		proxy_read_timeout 120;
		proxy_redirect off;
		proxy_pass http://umrah-mgmt-umrah;
	}

	error_page 502 /502.html;
	location /502.html {
		root /home/iicc2/.local/share/uv/tools/umrah-mgmt/lib/python3.14/site-packages/bench/config/templates;
		internal;
	}

	access_log  /var/log/nginx/access.log main;
	error_log  /var/log/nginx/error.log;

	sendfile on;
	keepalive_timeout 15;
	client_max_body_size 50m;
	client_body_buffer_size 16K;
	client_header_buffer_size 1k;

	gzip on;
	gzip_http_version 1.1;
	gzip_comp_level 5;
	gzip_min_length 256;
	gzip_proxied any;
	gzip_vary on;
	gzip_types
		application/atom+xml
		application/javascript
		application/json
		application/rss+xml
		application/vnd.ms-fontobject
		application/x-font-ttf
		application/font-woff
		application/x-web-app-manifest+json
		application/xhtml+xml
		application/xml
		font/opentype
		image/svg+xml
		image/x-icon
		text/css
		text/plain
		text/x-component
		;
}
